name: Security Scan (PR)

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: security-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'fs'
          scanners: 'vuln'
          format: 'table'
          output: 'trivy-results.txt'
          exit-code: '0'
        continue-on-error: true

      - name: Run Semgrep SAST
        run: pip install semgrep==1.113.0 --quiet && semgrep --config p/rust --config p/security-audit --output semgrep-results.txt . || true
        continue-on-error: true

      - name: Compose comment body
        id: comment-body
        run: |
          body="## Security Scan Results"
          body+=$'\n\n'
          body+="### Trivy Vulnerability Scan"
          body+=$'\n\n'
          if [ -s trivy-results.txt ]; then
            body+='```'
            body+=$'\n'
            body+="$(cat trivy-results.txt)"
            body+=$'\n'
            body+='```'
          elif [ -f trivy-results.txt ]; then
            body+="No vulnerabilities found."
          else
            body+="⚠️ Scan failed — see Actions logs"
          fi
          body+=$'\n\n'
          body+="### Semgrep SAST Results"
          body+=$'\n\n'
          if [ -s semgrep-results.txt ]; then
            body+='```'
            body+=$'\n'
            body+="$(cat semgrep-results.txt)"
            body+=$'\n'
            body+='```'
          elif [ -f semgrep-results.txt ]; then
            body+="No issues found."
          else
            body+="⚠️ Scan failed — see Actions logs"
          fi

          # Truncate to 60000 chars
          if [ ${#body} -gt 60000 ]; then
            body="${body:0:60000}"
            body+=$'\n\n_Output truncated. See the Actions run logs for full results._'
          fi

          DELIM="EOF_$(openssl rand -hex 16)"
          echo "body<<${DELIM}" >> $GITHUB_OUTPUT
          echo "$body" >> $GITHUB_OUTPUT
          echo "${DELIM}" >> $GITHUB_OUTPUT

      - name: Write comment body to file
        run: printf '%s\n' "$COMMENT_BODY" > /tmp/comment-body.txt
        env:
          COMMENT_BODY: ${{ steps.comment-body.outputs.body }}

      - name: Find existing comment
        uses: peter-evans/find-comment@3eae4d37986fb5a8592848f6a574fdf654e61f9e # v3.1.0
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '## Security Scan Results'

      - name: Post or update PR comment
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4.0.0
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          body-file: /tmp/comment-body.txt
          edit-mode: replace
        continue-on-error: true
